<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Abrigo de Animais - Exercício de Seletores</title>
    <link rel="stylesheet" href="seletores.css">

    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;

        }

        #topo-principal {
            background-color: #333;
            color: #f4f4f4;
            padding: 20px;
        }

        .card {
            background-color: white;
            border-radius: 10px;
            width: 200px;
        }

        p span {
            font-weight: bold;
            color: blue;
        }

        h1, h2 {
            color: #2c3e50;
        }

        .card.destaque {
            border: 3px solid gold;
            scale: (1.05);
        }

        button:hover {
            background-color: #27ae60;
            cursor: pointer;
        }

        nav ul li:nth-child(2) {
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header id="topo-principal">
        <h1>Amigo Pet</h1>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Adotar</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="lista-animais">
            <article class="card">
                <h2>Rex</h2>
                <p>Raça: <span>Labrador</span></p>
                <button>Quero Adotar</button>
            </article>

            <article class="card destaque">
                <h2>Luna</h2>
                <p>Raça: <span>Vira-lata</span></p>
                <button>Quero Adotar</button>
            </article>

            <article class="card">
                <h2>Miau</h2>
                <p>Raça: <span>Siamês</span></p>
                <button>Quero Adotar</button>
            </article>
        </section>
    </main>

</body>
</html>
